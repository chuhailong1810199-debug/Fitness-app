<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#0d0d0d;color:#f0f0f0;padding:1rem;min-height:100vh;}
.app{max-width:500px;margin:0 auto;}

/* CLIENT SELECTOR */
.client-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;background:#161616;border:1px solid #222;border-radius:8px;padding:10px 14px;}
.client-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;font-weight:700;white-space:nowrap;}
.client-select{flex:1;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;color:#f0f0f0;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;padding:6px 10px;cursor:pointer;}
.client-select:focus{outline:none;border-color:#e8ff00;}
.client-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:3px;background:#1e1e00;color:#e8ff00;border:1px solid #3a3a00;white-space:nowrap;}

/* NAV */
.nav{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #222;}
.nav-tab{flex:1;padding:10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.nav-tab.active{color:#e8ff00;border-bottom-color:#e8ff00;}

/* HEADER */
.header{margin-bottom:1.5rem;}
h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fff;}
h1 span{color:#e8ff00;}
.subtitle{font-size:13px;color:#555;margin-top:2px;text-transform:uppercase;letter-spacing:1px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:#161616;border:1px solid #222;border-radius:10px;padding:14px 10px;text-align:center;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#e8ff00;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:#e8ff00;}
.stat-label{font-size:10px;color:#555;margin-top:2px;text-transform:uppercase;letter-spacing:1px;}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.day-tab{padding:6px 14px;border-radius:4px;border:1px solid #2a2a2a;background:#161616;font-size:12px;font-weight:700;cursor:pointer;color:#555;text-transform:uppercase;transition:all .15s;}
.day-tab:hover{border-color:#444;color:#aaa;}
.day-tab.active{background:#e8ff00;color:#0d0d0d;border-color:#e8ff00;}

/* PROGRESS */
.progress-wrap{margin-bottom:1.5rem;}
.progress-bar{height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:#e8ff00;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.progress-label{font-size:11px;color:#444;text-align:right;margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;}

/* PHASE */
.phase-header{display:flex;align-items:center;gap:10px;margin:1.25rem 0 .75rem;}
.phase-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:4px 10px;border-radius:3px;}
.phase-warmup{background:#1a2e1a;color:#44cc66;border:1px solid #2a4e2a;}
.phase-core{background:#1a1a2e;color:#6688ff;border:1px solid #2a2a4e;}
.phase-strength{background:#2e1a00;color:#ff9933;border:1px solid #4e3000;}
.phase-accessories{background:#2e1a2e;color:#cc66ff;border:1px solid #4e2a4e;}
.phase-note{font-size:11px;color:#444;}

/* EXERCISE CARD */
.exercise-card{background:#161616;border:1px solid #222;border-left:3px solid #2a2a2a;border-radius:8px;padding:14px 16px;margin-bottom:6px;transition:border-left-color .2s;}
.exercise-card.done-card{border-left-color:#e8ff00;}
.exercise-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.checkbox{width:22px;height:22px;border-radius:4px;border:2px solid #333;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;transition:all .15s;}
.checkbox:hover{border-color:#e8ff00;}
.checkbox.done{background:#e8ff00;border-color:#e8ff00;color:#0d0d0d;}
.exercise-name{font-size:14px;font-weight:700;flex:1;color:#f0f0f0;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;line-height:1.3;}
.exercise-name:hover{color:#e8ff00;}
.exercise-name.done{color:#444;text-decoration:line-through;}
.info-btn{width:20px;height:20px;border-radius:50%;border:1px solid #2a2a2a;background:transparent;color:#555;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.info-btn:hover{border-color:#e8ff00;color:#e8ff00;}
.badge{font-size:10px;padding:3px 7px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;background:#1e1e1e;color:#666;border:1px solid #2a2a2a;}
.sets-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sets-text{font-size:13px;color:#888;font-weight:600;}
.tempo-text{font-size:12px;color:#555;}

/* FINISH BTN */
.finish-btn{width:100%;padding:16px;border-radius:6px;background:#e8ff00;color:#0d0d0d;border:none;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;cursor:pointer;margin-top:1.25rem;text-transform:uppercase;letter-spacing:2px;transition:all .15s;}
.finish-btn:hover{background:#f5ff4d;transform:translateY(-1px);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#161616;border:1px solid #2a2a2a;border-top:3px solid #e8ff00;border-radius:10px;padding:1.5rem;max-width:420px;width:100%;}
.modal-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;text-transform:uppercase;color:#fff;margin-bottom:.2rem;}
.modal-phase{font-size:12px;color:#e8ff00;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
.modal-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px;}
.modal-value{font-size:14px;color:#ccc;line-height:1.6;}
.modal-close{width:100%;padding:10px;border-radius:6px;background:transparent;border:1px solid #333;color:#aaa;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:1rem;}
.modal-close:hover{border-color:#e8ff00;color:#e8ff00;}

/* PROGRESS PAGE */
.progress-page{display:none;}
.progress-page.active{display:block;}
.workout-page.hidden{display:none;}
.streak-badge{display:inline-flex;align-items:center;gap:8px;background:#161616;border:1px solid #2a2a2a;border-radius:6px;padding:10px 14px;margin-bottom:1rem;}
.streak-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:#e8ff00;}
.streak-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;}
.month-summary{background:#161616;border:1px solid #222;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem;}
.month-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;color:#555;letter-spacing:2px;margin-bottom:10px;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-dot{width:100%;aspect-ratio:1;border-radius:3px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:9px;color:#333;font-weight:700;}
.day-dot.worked{background:#e8ff00;color:#0d0d0d;}
.day-dot.today{border:1px solid #e8ff00;}
.week-card{background:#161616;border:1px solid #222;border-radius:10px;padding:1.25rem;margin-bottom:8px;}
.week-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.week-label{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;color:#fff;}
.week-sessions{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#e8ff00;}
.week-bar-wrap{height:3px;background:#222;border-radius:2px;margin-bottom:8px;overflow:hidden;}
.week-bar{height:100%;background:#e8ff00;border-radius:2px;}
.week-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;}
.week-stat-num{font-size:15px;font-weight:700;color:#f0f0f0;}
.week-stat-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:#1e1e1e;}

/* LOADING */
.loading{text-align:center;padding:3rem;color:#444;font-size:14px;text-transform:uppercase;letter-spacing:1px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Fitness <span>Tracker</span></h1>
    <p class="subtitle" id="date-display"></p>
  </div>

  <!-- CLIENT SELECTOR -->
  <div class="client-bar">
    <span class="client-label">Client</span>
    <select class="client-select" id="client-select" onchange="switchClient()">
      <option value="">Loading...</option>
    </select>
    <span class="client-badge" id="client-level">—</span>
  </div>

  <div class="nav">
    <div class="nav-tab active" onclick="showPage('workout')">Workout</div>
    <div class="nav-tab" onclick="showPage('progress')">Progress</div>
  </div>

  <!-- WORKOUT PAGE -->
  <div class="workout-page" id="workout-page">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="sessions">0</div><div class="stat-label">Sessions</div></div>
      <div class="stat"><div class="stat-num" id="done-count">0/0</div><div class="stat-label">Completed</div></div>
      <div class="stat"><div class="stat-num" id="total-vol">0</div><div class="stat-label">Volume kg</div></div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0% complete</div>
    </div>
    <div id="exercise-list"><div class="loading">Loading program...</div></div>
    <button class="finish-btn" onclick="finishWorkout()">Complete Workout ✓</button>
  </div>

  <!-- PROGRESS PAGE -->
  <div class="progress-page" id="progress-page">
    <div class="streak-badge">
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">Day Streak 🔥</div>
    </div>
    <div class="month-summary">
      <div class="month-title" id="month-title">This Month</div>
      <div class="month-grid" id="month-grid"></div>
    </div>
    <div class="section-title">Weekly Log</div>
    <div id="weekly-log"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-phase" id="modal-phase"></div>
    <div class="modal-row">
      <div><div class="modal-label">Sets × Reps</div><div class="modal-value" id="modal-setsreps"></div></div>
      <div><div class="modal-label">Tempo</div><div class="modal-value" id="modal-tempo"></div></div>
    </div>
    <div><div class="modal-label">Coaching Cue</div><div class="modal-value" id="modal-cue"></div></div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">Close</button>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const phaseTagClass = { warmup:'phase-warmup', core:'phase-core', strength:'phase-strength', accessories:'phase-accessories' };

let clientsData = [];
let activeClient = null;
let activeDay = DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
let state = {};

// Load clients.json
async function loadClients() {
  try {
    const res = await fetch('clients.json');
    const data = await res.json();
    clientsData = data.clients;
    populateClientSelect();
    switchClient();
  } catch(e) {
    document.getElementById('exercise-list').innerHTML = '<div class="loading">Error loading clients.json</div>';
  }
}

function populateClientSelect() {
  const sel = document.getElementById('client-select');
  sel.innerHTML = clientsData.map(c =>
    `<option value="${c.id}">${c.name}</option>`
  ).join('');
}

function switchClient() {
  const id = document.getElementById('client-select').value;
  activeClient = clientsData.find(c => c.id === id);
  if (!activeClient) return;

  // Load state for this client
  const saved = localStorage.getItem('fitness_'+id);
  state = saved ? JSON.parse(saved) : { sessions:0, checked:{}, history:[] };

  document.getElementById('client-level').textContent = activeClient.level;
  renderTabs();
  renderExercises();
}

function save() {
  localStorage.setItem('fitness_'+activeClient.id, JSON.stringify(state));
}

function getProgram() {
  return activeClient.program[activeDay];
}

function allExercises() {
  const prog = getProgram();
  if (!prog) return [];
  return prog.phases.flatMap(p => p.exercises);
}

function exKey(pi, ei) { return activeDay+'_'+pi+'_'+ei; }

function updateStats() {
  const prog = getProgram();
  if (!prog) return;
  const total = allExercises().length;
  const done = prog.phases.reduce((acc,ph,pi) =>
    acc + ph.exercises.filter((_,ei) => state.checked[exKey(pi,ei)]).length, 0);
  document.getElementById('sessions').textContent = state.sessions;
  document.getElementById('done-count').textContent = done+'/'+total;
  document.getElementById('total-vol').textContent = 0;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress').style.width = pct+'%';
  document.getElementById('progress-label').textContent = pct+'% complete';
}

function toggleCheck(pi, ei) {
  const key = exKey(pi,ei);
  state.checked[key] = !state.checked[key];
  save(); renderExercises();
}

function openInfo(pi, ei) {
  const prog = getProgram();
  const phase = prog.phases[pi];
  const ex = phase.exercises[ei];
  document.getElementById('modal-name').textContent = ex.name;
  document.getElementById('modal-phase').textContent = phase.name;
  document.getElementById('modal-setsreps').textContent = ex.setsReps;
  document.getElementById('modal-tempo').textContent = ex.tempo;
  document.getElementById('modal-cue').textContent = ex.cue;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}

function renderExercises() {
  const prog = getProgram();
  const list = document.getElementById('exercise-list');
  if (!prog) { list.innerHTML = '<div class="loading">Rest Day 💤</div>'; updateStats(); return; }

  list.innerHTML = '';
  prog.phases.forEach((phase, pi) => {
    const phaseDiv = document.createElement('div');
    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `<span class="phase-tag ${phaseTagClass[phase.tag]||'phase-warmup'}">${phase.name}</span><span class="phase-note">${phase.note}</span>`;
    phaseDiv.appendChild(header);

    phase.exercises.forEach((ex, ei) => {
      const key = exKey(pi,ei);
      const done = !!state.checked[key];
      const card = document.createElement('div');
      card.className = 'exercise-card'+(done?' done-card':'');
      card.innerHTML = `
        <div class="exercise-header">
          <div class="checkbox ${done?'done':''}" onclick="toggleCheck(${pi},${ei})">${done?'✓':''}</div>
          <span class="exercise-name ${done?'done':''}" onclick="openInfo(${pi},${ei})">${ex.name}</span>
          <span class="badge">${ex.type}</span>
          <button class="info-btn" onclick="openInfo(${pi},${ei})">i</button>
        </div>
        <div class="sets-row">
          <span class="sets-text">${ex.setsReps}</span>
          <span style="color:#333;margin:0 4px;">·</span>
          <span class="tempo-text">${ex.tempo}</span>
        </div>`;
      phaseDiv.appendChild(card);
    });
    list.appendChild(phaseDiv);
  });
  updateStats();
}

function finishWorkout() {
  const total = allExercises().length;
  const prog = getProgram();
  if (!prog) return;
  const done = prog.phases.reduce((acc,ph,pi) =>
    acc + ph.exercises.filter((_,ei) => state.checked[exKey(pi,ei)]).length, 0);
  if (done===0) { alert('Please tick at least 1 exercise first!'); return; }
  state.sessions++;
  const today = new Date().toISOString().split('T')[0];
  if (!state.history.includes(today)) state.history.push(today);
  save(); updateStats();
  alert('Workout complete! Total sessions: '+state.sessions+' 🎉');
}

function renderTabs() {
  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = '';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab'+(d===activeDay?' active':'');
    btn.textContent = d;
    btn.onclick = () => { activeDay=d; renderTabs(); renderExercises(); };
    tabs.appendChild(btn);
  });
}

function showPage(page) {
  document.getElementById('workout-page').className = 'workout-page'+(page==='workout'?'':' hidden');
  document.getElementById('progress-page').className = 'progress-page'+(page==='progress'?' active':'');
  document.querySelectorAll('.nav-tab').forEach((t,i) =>
    t.classList.toggle('active',(i===0&&page==='workout')||(i===1&&page==='progress')));
  if (page==='progress') renderProgress();
}

function renderProgress() {
  let streak=0;
  const today=new Date();
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(state.history.includes(d.toISOString().split('T')[0]))streak++;
    else if(i>0)break;
  }
  document.getElementById('streak-num').textContent=streak;

  const now=new Date(),year=now.getFullYear(),month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  document.getElementById('month-title').textContent=now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const grid=document.getElementById('month-grid');grid.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach(d=>{const el=document.createElement('div');el.className='day-dot';el.style.background='transparent';el.style.color='#333';el.textContent=d;grid.appendChild(el);});
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='day-dot';grid.appendChild(el);}
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div');
    el.className='day-dot'+(state.history.includes(dk)?' worked':'')+(d===now.getDate()?' today':'');
    el.textContent=d;grid.appendChild(el);
  }

  const container=document.getElementById('weekly-log');container.innerHTML='';
  const dow=(today.getDay()+6)%7;
  for(let w=0;w<8;w++){
    const mon=new Date(today);mon.setDate(today.getDate()-dow-w*7);
    const days=[];
    for(let d=0;d<7;d++){const day=new Date(mon);day.setDate(mon.getDate()+d);days.push(day.toISOString().split('T')[0]);}
    const sessions=days.filter(d=>state.history.includes(d)).length;
    const pct=Math.round(sessions/5*100);
    const card=document.createElement('div');card.className='week-card';
    card.innerHTML=`
      <div class="week-header">
        <div class="week-label">${w===0?'This Week':w===1?'Last Week':'Week of '+mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        <div class="week-sessions">${sessions} <span style="font-size:12px;color:#555;font-weight:400">sessions</span></div>
      </div>
      <div class="week-bar-wrap"><div class="week-bar" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="week-stats">
        <div><div class="week-stat-num">${sessions}</div><div class="week-stat-label">Sessions</div></div>
        <div><div class="week-stat-num">${Math.min(pct,100)}%</div><div class="week-stat-label">Consistency</div></div>
        <div><div class="week-stat-num">${sessions>0?'✓':'—'}</div><div class="week-stat-label">Active</div></div>
      </div>`;
    container.appendChild(card);
  }
}

document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
loadClients();
</script>
</body>
</html>
