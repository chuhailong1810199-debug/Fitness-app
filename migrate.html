<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migration Tool — Fitness App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:monospace;background:#0d0d0d;color:#f0f0f0;padding:2rem;min-height:100vh;}
h1{font-size:20px;color:#e8ff00;margin-bottom:.25rem;}
.sub{font-size:13px;color:#555;margin-bottom:1.5rem;}
.card{background:#161616;border:1px solid #222;border-radius:8px;padding:1.25rem 1.5rem;max-width:680px;margin-bottom:1rem;}
.card h2{font-size:11px;color:#555;margin-bottom:1rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.btn{padding:9px 18px;border-radius:5px;background:#e8ff00;color:#0d0d0d;border:none;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
.btn:hover{background:#f5ff4d;}
.btn:disabled{background:#2a2a2a;color:#444;cursor:not-allowed;}
.btn-red{background:transparent;color:#ff4444;border:1px solid #4e1a1a;}
.btn-red:hover{background:#2e1a1a;}
.btn-blue{background:transparent;color:#6688ff;border:1px solid #2a2a4e;}
.btn-blue:hover{background:#1a1a2e;}
.btn-green{background:transparent;color:#44cc66;border:1px solid #1a4e2a;}
.btn-green:hover{background:#0d2e0d;}
.log{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;padding:1rem;height:260px;overflow-y:auto;font-size:11px;line-height:1.9;}
.ok{color:#44cc66;}.err{color:#ff4444;}.info{color:#666;}.warn{color:#e8ff00;}
.google-btn{padding:11px 18px;border-radius:5px;background:#fff;color:#222;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;width:fit-content;}
.user-ok{font-size:12px;color:#44cc66;padding:7px 11px;background:#0d2e0d;border-radius:4px;border:1px solid #1a4e1a;margin-bottom:.75rem;display:inline-block;}
.status{font-size:13px;margin-top:.75rem;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:.5rem;}
th{background:#1e1e1e;color:#555;padding:5px 10px;text-align:left;text-transform:uppercase;letter-spacing:.5px;}
td{padding:5px 10px;border-bottom:1px solid #1a1a1a;color:#aaa;}
.badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;}
.b-ok{background:#0d2e0d;color:#44cc66;}
.b-dup{background:#2e1a00;color:#ff9933;}
.b-empty{background:#2e1a1a;color:#ff4444;}
.section{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #1e1e1e;}
.section-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:.75rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=email],select{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;color:#f0f0f0;font-size:12px;padding:7px 10px;font-family:monospace;width:100%;}
input:focus,select:focus{outline:none;border-color:#e8ff00;}
.preview-box{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;padding:.75rem;font-size:11px;color:#666;max-height:120px;overflow-y:auto;margin-top:.5rem;}
</style>
</head>
<body>
<h1>Migration Tool</h1>
<div class="sub">Quản lý data clients trong Firebase Firestore</div>

<!-- AUTH -->
<div class="card">
  <h2>Đăng nhập</h2>
  <button class="google-btn" id="login-btn" onclick="loginGoogle()">
    <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
    Đăng nhập Google
  </button>
  <div id="user-ok" style="display:none" class="user-ok"></div>
</div>

<!-- MAIN ACTIONS -->
<div class="card" id="main" style="opacity:.3;pointer-events:none">
  <h2>Quản lý Firestore</h2>
  <div class="btns">
    <button class="btn btn-blue" onclick="scanData()">Scan</button>
    <button class="btn" onclick="migrateJson()">Migrate clients.json</button>
    <button class="btn btn-red" onclick="clearDuplicates()">Xoá Duplicate</button>
    <button class="btn btn-red" onclick="clearAll()">Xoá tất cả</button>
  </div>
  <div class="log" id="log"><span class="info">Bấm Scan để xem trạng thái...</span></div>
  <div class="status" id="status"></div>

  <!-- SANG QUICK PUSH -->
  <div class="section">
    <div class="section-title">Push Sang — từ Excel đã parse sẵn</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Gmail của Sang</label>
        <input type="email" id="sang-email" placeholder="sang@gmail.com">
      </div>
    </div>
    <div class="btns" style="margin-top:8px;margin-bottom:0">
      <button class="btn btn-green" onclick="pushSang()">Push Sang lên Firestore</button>
    </div>
  </div>

  <!-- IMPORT EXCEL -->
  <div class="section">
    <div class="section-title">Import client mới từ Excel</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tên client</label>
        <input type="text" id="imp-name" placeholder="Thai Son">
      </div>
      <div class="form-group">
        <label class="form-label">Gmail</label>
        <input type="email" id="imp-email" placeholder="client@gmail.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Level</label>
        <select id="imp-level">
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Goal</label>
        <input type="text" id="imp-goal" placeholder="Strength + Fat Loss">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:8px">
      <label class="form-label">File Excel (.xlsx) — format giống Sang_Training_Program.xlsx</label>
      <input type="file" id="imp-file" accept=".xlsx" style="color:#888;padding:6px 0;"
        onchange="previewExcel(this)">
    </div>
    <div class="preview-box" id="preview-box">Preview sẽ hiện ở đây sau khi chọn file...</div>
    <div class="btns" style="margin-top:10px;margin-bottom:0">
      <button class="btn btn-green" onclick="importClient()">Import → Firestore</button>
    </div>
  </div>
</div>

<!-- TABLE -->
<div class="card" id="tbl-card" style="display:none">
  <h2>Clients trong Firestore</h2>
  <div id="tbl"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

const cfg = {

// Sang data parsed from Excel
const SANG_DATA = {"name": "Sang", "email": "", "level": "Beginner", "goal": "Reduce body fat · Improve posture · Maximize height potential", "sessionsPerWeek": 3, "program": {"Mon": {"label": "Session A — Strength", "phases": [{"name": "WARM-UP", "tag": "warmup", "note": "(10 min)", "exercises": [{"name": "Hip Circles", "setsReps": "2 × 10 each side", "tempo": "Controlled", "type": "mobility", "cue": "Slow and full range — mobilise hip joint before loading | Load: Bodyweight"}, {"name": "Thoracic Rotation (Seated)", "setsReps": "2 × 8 each side", "tempo": "Slow", "type": "mobility", "cue": "Unlock mid-back; sit on mat, hands behind head | Load: Bodyweight"}, {"name": "Ankle Circles", "setsReps": "2 × 10 each", "tempo": "Controlled", "type": "mobility", "cue": "Prep for squat pattern; improve dorsiflexion | Load: Bodyweight"}, {"name": "Bodyweight Squat", "setsReps": "2 × 10", "tempo": "2-1-2", "type": "primary", "cue": "Rehearse the pattern; cue: chest up, knees track toes | Load: Bodyweight"}]}, {"name": "STRENGTH PHASE", "tag": "strength", "note": "(30–35 min)", "exercises": [{"name": "Goblet Squat", "setsReps": "3 × 8–10", "tempo": "2-1-2", "type": "primary", "cue": "Heels flat, chest tall, depth ≥ parallel. KEY squat teacher. | Load: Week 1–4: Light DB | Progress +1–2 kg"}, {"name": "Romanian Deadlift (Dumbbell)", "setsReps": "3 × 8–10", "tempo": "3-1-1", "type": "primary", "cue": "Hinge at hips, not bend. Feel hamstring stretch. Neutral spine. | Load: Week 1–4: Light-Mod DB"}, {"name": "Push-Up (chest-to-floor)", "setsReps": "3 × AMRAP*", "tempo": "2-0-2", "type": "primary", "cue": "Log reps each set. Progress = more reps or elevated variation. | Load: *All clean reps"}, {"name": "DB Bent-Over Row", "setsReps": "3 × 10 each", "tempo": "2-1-2", "type": "primary", "cue": "Neutral spine, elbow drives back past torso. Row both sides. | Load: Light-Mod DB"}, {"name": "Plank Hold", "setsReps": "3 × 20–30 s", "tempo": "—", "type": "core", "cue": "Posterior pelvic tilt (squeeze glutes). No sagging hips. Progress duration weekly. | Load: Bodyweight"}]}, {"name": "MOBILITY COOLDOWN", "tag": "warmup", "note": "(10–12 min)", "exercises": [{"name": "90/90 Hip Stretch", "setsReps": "2 × 60 s each side", "tempo": "Static", "type": "mobility", "cue": "Key for pelvis alignment & anterior pelvic tilt correction | Load: Bodyweight"}, {"name": "World's Greatest Stretch", "setsReps": "2 × 5 reps each side", "tempo": "Flowing", "type": "mobility", "cue": "Full-body mobility combo — lunge, twist, reach | Load: Bodyweight"}, {"name": "Doorway Chest Stretch", "setsReps": "2 × 45 s each side", "tempo": "Static", "type": "mobility", "cue": "Counter desk/phone posture; open pec minor | Load: Bodyweight"}, {"name": "Cat-Cow Spine Mobilisation", "setsReps": "2 × 10 cycles", "tempo": "Slow", "type": "mobility", "cue": "Spinal decompression cooldown. Breathe into each position. | Load: Bodyweight"}]}]}, "Wed": {"label": "Session B — Plyometrics", "phases": [{"name": "WARM-UP", "tag": "warmup", "note": "(10 min)", "exercises": [{"name": "Jumping Jacks", "setsReps": "1 × 30 s", "tempo": "Moderate", "type": "power", "cue": "Elevate heart rate gently before explosive work | Load: Bodyweight"}, {"name": "Leg Swings (front + side)", "setsReps": "2 × 10 each direction", "tempo": "Dynamic", "type": "primary", "cue": "Hip flexor activation — essential before plyos | Load: Bodyweight"}, {"name": "Arm Circles", "setsReps": "2 × 10 each dir.", "tempo": "Dynamic", "type": "mobility", "cue": "Shoulder warm-up; forward and backward | Load: Bodyweight"}, {"name": "Skips / High Knees in Place", "setsReps": "1 × 20 s", "tempo": "Rhythmic", "type": "activation", "cue": "CNS activation before plyometric work | Load: Bodyweight"}]}, {"name": "PLYOMETRIC PHASE", "tag": "strength", "note": "(20–25 min)", "exercises": [{"name": "Box Jump (30–40 cm platform)", "setsReps": "4 × 5 reps", "tempo": "Explosive", "type": "power", "cue": "Soft landing: toe-ball-heel. Hips back. Knees  Load: Bodyweight"}, {"name": "Child's Pose + Lat Reach", "setsReps": "2 × 45 s each side", "tempo": "Static", "type": "mobility", "cue": "Thoracic & lat opener. Reach arm along floor for extra stretch. | Load: Bodyweight"}, {"name": "Calf Stretch — bent + straight knee", "setsReps": "2 × 45 s each", "tempo": "Static", "type": "mobility", "cue": "Both positions target different calf muscles. Improves squat depth over time. | Load: Bodyweight"}]}]}, "Fri": {"label": "Session C — Strength", "phases": [{"name": "WARM-UP", "tag": "warmup", "note": "(10 min)", "exercises": [{"name": "Foam Roll Thoracic Spine", "setsReps": "1 × 60 s", "tempo": "Slow", "type": "activation", "cue": "10 passes across mid-back. Mobilise before loading. Pause on tight spots. | Load: Foam roller"}, {"name": "Band Pull-Apart", "setsReps": "2 × 12 reps", "tempo": "Controlled", "type": "activation", "cue": "Activate mid-back & rotator cuff. Arms straight, thumbs up. | Load: Light resistance band"}, {"name": "Glute Bridge Activation", "setsReps": "2 × 10 reps", "tempo": "2-1-2", "type": "activation", "cue": "Wake up posterior chain before deadlift. Squeeze glutes at top. | Load: Bodyweight"}, {"name": "Inchworm Walk-Out", "setsReps": "2 × 5 reps", "tempo": "Slow", "type": "activation", "cue": "Walk hands out to plank position and back. Full body prep. | Load: Bodyweight"}]}, {"name": "STRENGTH PHASE", "tag": "strength", "note": "(35 min)", "exercises": [{"name": "Trap-Bar / Hex-Bar Deadlift", "setsReps": "3 × 5–6", "tempo": "2-1-1", "type": "primary", "cue": "PREFERRED over barbell. Vertical torso — safer for growing spine. Hinge and drive floor away. | Load: Week 1–4: Light-Mod | Progress carefully"}, {"name": "Incline DB Press (30°)", "setsReps": "3 × 8–10", "tempo": "2-1-2", "type": "primary", "cue": "Shoulder-safe pressing. 30° incline targets chest + anterior delt. Neutral grip option. | Load: Light-Mod DB"}, {"name": "Single-Leg RDL (Bodyweight)", "setsReps": "3 × 6 each side", "tempo": "3-1-1", "type": "primary", "cue": "Balance + posterior chain. Hold wall if needed. Flat back, hinge to feel hamstring. | Load: Bodyweight → add load Ph2"}, {"name": "Seated Cable Row (or Band Row)", "setsReps": "3 × 10–12", "tempo": "2-1-2", "type": "primary", "cue": "Retract scapula fully at end range. Row to lower chest. Chest stays tall. | Load: Mod weight / band"}, {"name": "Dead Bug", "setsReps": "3 × 6 each side", "tempo": "Slow", "type": "core", "cue": "Opposite arm + leg extend slowly. Lower back FLAT on floor throughout. Exhale on extend. | Load: Bodyweight"}, {"name": "Reverse Hyper / Superman Hold", "setsReps": "3 × 12 / 30 s", "tempo": "Controlled", "type": "core", "cue": "Erector spinae + glute activation. For height: spine decompression + posterior chain strength. | Load: Bodyweight"}]}, {"name": "MOBILITY COOLDOWN", "tag": "warmup", "note": "(12 min)", "exercises": [{"name": "Pigeon Pose", "setsReps": "2 × 75 s each side", "tempo": "Static", "type": "mobility", "cue": "Deep hip external rotation. Place cushion under hip if tight. Breathe and relax into it. | Load: Bodyweight"}, {"name": "Wall Angel Drill", "setsReps": "2 × 10 slow reps", "tempo": "Slow active", "type": "mobility", "cue": "Stand with back FLAT on wall. Slide arms up overhead. KEY daily posture habit. | Load: Wall"}, {"name": "Thoracic Extension over Foam Roll", "setsReps": "2 × 60 s", "tempo": "Passive", "type": "activation", "cue": "Lie over roller at mid-back. Arms across chest. Open chest. Spinal decompression. | Load: Foam roller"}, {"name": "Standing Forward Fold", "setsReps": "2 × 60 s", "tempo": "Static", "type": "mobility", "cue": "Hamstring length. Soft bend in knees if very tight. Relaxes spine after loading. | Load: Bodyweight"}]}]}}};

onAuthStateChanged(auth, u => {
  me = u;
  if (u) {
    document.getElementById('user-ok').style.display = 'inline-block';
    document.getElementById('user-ok').textContent   = '✓ ' + u.email;
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('main').style.opacity       = '1';
    document.getElementById('main').style.pointerEvents = 'auto';
  }
});

window.loginGoogle = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { alert(e.message); }
};

const L = document.getElementById('log');
const S = document.getElementById('status');
function log(m, t='info') {
  const d = document.createElement('div');
  d.className = t;
  d.textContent = new Date().toLocaleTimeString('vi') + '  ' + m;
  L.appendChild(d); L.scrollTop = 99999;
}
function clr() { L.innerHTML = ''; S.textContent = ''; }

// ── SCAN ──
window.scanData = async () => {
  clr(); log('Scanning Firestore...','info');
  const snap = await getDocs(collection(db,'clients'));
  const all = []; snap.forEach(d => all.push({id:d.id,...d.data()}));
  const nameCount = {};
  all.forEach(c => { const n=(c.name||'').toLowerCase().trim(); nameCount[n]=(nameCount[n]||0)+1; });
  const rows = all.map(c => {
    const n=(c.name||'').toLowerCase().trim();
    const dup = nameCount[n]>1;
    const days = Object.keys(c.program||{}).length;
    let ex=0; Object.values(c.program||{}).forEach(d=>(d.phases||[]).forEach(p=>ex+=(p.exercises||[]).length));
    const badge = dup?'<span class="badge b-dup">DUP</span>':!days?'<span class="badge b-empty">EMPTY</span>':'<span class="badge b-ok">OK</span>';
    return `<tr><td>${c.name||'—'}</td><td style="color:#444;font-size:10px">${c.id}</td><td>${c.email||'—'}</td><td>${days} days / ${ex} ex</td><td>${badge}</td></tr>`;
  }).join('');
  document.getElementById('tbl-card').style.display='block';
  document.getElementById('tbl').innerHTML=`<table><tr><th>Name</th><th>ID</th><th>Email</th><th>Program</th><th>Status</th></tr>${rows||'<tr><td colspan=5 style="color:#444">Chưa có client</td></tr>'}</table>`;
  const dups = Object.values(nameCount).filter(v=>v>1).length;
  log(`${all.length} clients | ${dups} duplicates`, dups>0?'warn':'ok');
  S.textContent = dups>0?`⚠ ${dups} duplicate — bấm Xoá Duplicate`:`✓ Clean — ${all.length} clients`;
  S.style.color = dups>0?'#ff9933':'#44cc66';
};

// ── MIGRATE JSON ──
window.migrateJson = async () => {
  if(!me){alert('Login first');return;} clr();
  log('Loading clients.json...','info');
  const r = await fetch('https://raw.githubusercontent.com/chuhailong1810199-debug/Fitness-app/main/clients.json',{cache:'no-cache'});
  if(!r.ok){log('Cannot load clients.json: '+r.status,'err');return;}
  const clients = (await r.json()).clients||[];
  log(`Found ${clients.length} clients`,'ok');
  const seen=new Set();
  for(const c of clients){
    if(seen.has(c.id)){log(`Skip dup: ${c.id}`,'warn');continue;}
    seen.add(c.id);
    await setDoc(doc(db,'clients',c.id),{
      name:c.name,level:c.level||'Beginner',goal:c.goal||'',
      sessionsPerWeek:c.sessionsPerWeek||3,email:c.email||'',
      coachUid:me.uid,program:c.program||{},
      createdAt:serverTimestamp(),migratedAt:serverTimestamp()
    });
    log(`✓ ${c.name}`,'ok');
  }
  log('Done!','ok'); await scanData();
};

// ── PUSH SANG ──
window.pushSang = async () => {
  if(!me){alert('Login first');return;}
  const email = document.getElementById('sang-email').value.trim().toLowerCase();
  if(!email){alert('Nhập Gmail của Sang');return;}
  clr(); log('Pushing Sang...','info');
  const data = {...SANG_DATA, email, coachUid:me.uid, createdAt:serverTimestamp()};
  await setDoc(doc(db,'clients','sang'), data);
  log(`✓ Sang pushed — Mon:${Object.keys(SANG_DATA.program.Mon?.phases||{}).length} phases, Wed:${Object.keys(SANG_DATA.program.Wed?.phases||{}).length} phases, Fri:${Object.keys(SANG_DATA.program.Fri?.phases||{}).length} phases`,'ok');
  S.textContent = '✓ Sang lên Firestore thành công!'; S.style.color='#44cc66';
  await scanData();
};

// ── PARSE EXCEL (client-side, same format as Sang) ──
const PHASE_MAP = {warm:'warmup',plyometric:'strength',strength:'strength',cardio:'accessories',mobility:'warmup',cooldown:'warmup'};
const SESSION_DAYS = {A:'Mon',B:'Wed',C:'Fri'};

function parseXlsx(wb) {
  const program = {};
  for(const sname of wb.SheetNames) {
    // Detect session sheets by letter A/B/C
    const match = sname.match(/Session ([ABC])/i);
    if(!match) continue;
    const day = SESSION_DAYS[match[1].toUpperCase()];
    const ws = wb.Sheets[sname];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
    const label = rows[0]?.[0] ? String(rows[0][0]).replace(/[📗📙📘]/g,'').trim() : sname;
    const phases=[]; let curPhase=null, inEx=false;
    for(const row of rows) {
      const c0 = row[0]!=null ? String(row[0]).trim() : '';
      if(['🔥','💪','⚡','🏃','🧘'].some(e=>c0.includes(e)) && row[1]==null) {
        if(curPhase?.exercises?.length) phases.push(curPhase);
        const low=c0.toLowerCase();
        const tag=Object.entries(PHASE_MAP).find(([k])=>low.includes(k))?.[1]||'warmup';
        let pname=c0.replace(/[🔥💪⚡🏃🧘]/g,'').trim(), note='';
        if(pname.includes('(')){ const p=pname.split('('); note='('+p[1]; pname=p[0].trim(); }
        curPhase={name:pname,tag,note,exercises:[]}; inEx=false; continue;
      }
      if(c0==='Exercise'&&row[1]!=null){inEx=true;continue;}
      if(c0.includes('📌')||(!c0&&row[1]==null)) continue;
      if(inEx&&curPhase&&row[1]!=null) {
        const low=c0.toLowerCase();
        let etype='primary';
        if(/jump|hop|bound|sprint|ladder|shuttle|depth drop/.test(low)) etype='power';
        else if(/stretch|fold|pose|angel|mobilisation|rotation|circle|pigeon|child/.test(low)) etype='mobility';
        else if(/plank|bug|hold|dead bug|superman|reverse hyper/.test(low)) etype='core';
        else if(/interval|cardio|bike|run/.test(low)) etype='cardio';
        else if(/jack|skip|high knee|inchworm|foam roll|band pull|glute bridge/.test(low)) etype='activation';
        const load = row[5]?String(row[5]).replace(/\n/g,' | '):'';
        const cue  = row[6]?String(row[6]).replace(/\n/g,' '):'';
        curPhase.exercises.push({
          name:c0,
          setsReps:`${String(row[1]).trim()} × ${String(row[2]||'').trim()}`,
          tempo:row[4]?String(row[4]).trim():'',
          type:etype,
          cue:(cue+(load?' | Load: '+load:'')).trim()
        });
      }
    }
    if(curPhase?.exercises?.length) phases.push(curPhase);
    program[day]={label,phases};
  }
  return program;
}

window.previewExcel = (input) => {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      parsedProgram = parseXlsx(wb);
      const lines = Object.entries(parsedProgram).map(([day,d])=> {
        const ex = d.phases.reduce((a,p)=>a+p.exercises.length,0);
        return `${day}: ${d.label.substring(0,35)} — ${d.phases.length} phases, ${ex} exercises`;
      });
      document.getElementById('preview-box').innerHTML =
        '<span style="color:#44cc66">✓ Parsed OK:</span><br>' + lines.join('<br>');
    } catch(err) {
      document.getElementById('preview-box').innerHTML =
        '<span style="color:#ff4444">✗ Lỗi parse: '+err.message+'</span>';
      parsedProgram = null;
    }
  };
  reader.readAsArrayBuffer(file);
};

window.importClient = async () => {
  if(!me){alert('Login first');return;}
  const name  = document.getElementById('imp-name').value.trim();
  const email = document.getElementById('imp-email').value.trim().toLowerCase();
  const level = document.getElementById('imp-level').value;
  const goal  = document.getElementById('imp-goal').value.trim();
  if(!name||!email){alert('Nhập tên và Gmail');return;}
  if(!parsedProgram){alert('Chọn file Excel trước');return;}
  clr();
  const id = name.toLowerCase().replace(/\s+/g,'_');
  await setDoc(doc(db,'clients',id),{
    name,email,level,goal,sessionsPerWeek:3,
    coachUid:me.uid,program:parsedProgram,
    createdAt:serverTimestamp()
  });
  log(`✓ ${name} (${email}) imported — ${Object.keys(parsedProgram).length} days`,'ok');
  S.textContent=`✓ ${name} lên Firestore thành công!`; S.style.color='#44cc66';
  await scanData();
};

// ── CLEAR DUPES ──
window.clearDuplicates = async () => {
  if(!me||!confirm('Xoá duplicate?')) return; clr();
  const snap = await getDocs(collection(db,'clients'));
  const byName={};
  snap.forEach(d=>{const n=(d.data().name||'').toLowerCase().trim();(byName[n]=byName[n]||[]).push({id:d.id,data:d.data()});});
  let del=0;
  for(const [,docs] of Object.entries(byName)){
    if(docs.length<=1)continue;
    docs.sort((a,b)=>{
      const ex=c=>Object.values(c.data.program||{}).reduce((s,d)=>s+(d.phases||[]).reduce((ss,p)=>ss+(p.exercises||[]).length,0),0);
      return ex(b)-ex(a);
    });
    log(`Keep: ${docs[0].id} (${Object.keys(docs[0].data.program||{}).length} days)`,'info');
    for(let i=1;i<docs.length;i++){await deleteDoc(doc(db,'clients',docs[i].id));log(`Del: ${docs[i].id}`,'warn');del++;}
  }
  log(`Xoá ${del} duplicates xong`,'ok'); await scanData();
};

// ── CLEAR ALL ──
window.clearAll = async () => {
  if(!me||!confirm('Xoá TOÀN BỘ clients?')) return; clr();
  const snap = await getDocs(collection(db,'clients'));
  for(const d of snap.docs){await deleteDoc(d.ref);log('Del: '+d.id,'warn');}
  log('Done','ok'); document.getElementById('tbl-card').style.display='none'; await scanData();
};
